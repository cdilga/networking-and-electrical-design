<line class="dim" x1="390.0" y1="738.6" x2="390.0" y2="925.8"/><text class="small" x="382.0" y="832.2" text-anchor="middle" transform="rotate(-90 382.0 832.2)">1040 nook</text>
<text class="label" x="60" y="967.8">Envelope: 1040 wall length x 620 depth. Build cart no wider than 980 and no deeper than 600 until site verified.</text>
<text class="section" x="455" y="105">2) Nook elevation — high wall cabinet</text>
