<line class="dim" x1="1165.0" y1="747.8" x2="1345.0" y2="747.8"/><text class="small" x="1255.0" y="740.8" text-anchor="middle">600 device depth</text>
<text class="tiny" x="850" y="781.8">600D leaves 1050 clear; door-sweep margin = 180. 450D leaves 1200 clear.</text>
<text class="tiny" x="850" y="799.8">Absolute max depth before modelled door-sweep contact = 780; recommended depth = 600-620.</text>
<text class="section" x="60" y="953">Mounting options — calculated high-mount envelope</text>
<rect class="soft" x="60" y="985" width="510" height="300" rx="8"/>
