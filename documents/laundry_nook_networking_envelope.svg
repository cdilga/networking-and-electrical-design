<text class="label" x="215" y="1023">Option A: 6U shallow wall cabinet</text>
<text class="small" x="78" y="1125">Cabinet: 600W x 450D x 375H</text>
<text class="small" x="78" y="1150">Top at 2440 leaves 150 to ceiling</text>
<text class="small" x="78" y="1175">Bottom at 2065; cart height &lt;= 2015</text>
