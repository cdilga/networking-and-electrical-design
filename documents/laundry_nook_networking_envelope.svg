<rect class="warn" x="60" y="1330" width="1560" height="95" rx="6"/>
<text class="note" x="80" y="1356">Assumptions: target is the 1040 blank segment beside the 1710 linen door; depth is the 620 Laundry D joinery/appliance line; door-swing model uses the 870 door radius.</text>
<text class="note" x="80" y="1380">Fabrication rule: cart &lt;= 980W x 600D until site measurement. Wall cabinet and tower cart should be structurally independent.</text>
<text class="note" x="80" y="1404">Structural/thermal rule: add noggins/backing or plywood backboard before sheeting for 9U/12U. Keep 150-200 top clearance and use cabinet fans for 10GbE/router heat.</text>
