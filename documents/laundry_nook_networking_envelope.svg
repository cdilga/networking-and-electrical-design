<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1480" viewBox="0 0 1700 1480">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 Z" fill="#374151" />
  </marker>
</defs>

<style>
  .bg{fill:#ffffff}
  .wall{stroke:#111;stroke-width:4;fill:none}
  .thin{stroke:#333;stroke-width:1.5;fill:none}
  .dash{stroke-dasharray:8 5}
  .dim{stroke:#374151;stroke-width:1.15;fill:none;marker-start:url(#arrow);marker-end:url(#arrow)}
  .label{font-family:Arial, Helvetica, sans-serif;font-size:15px;fill:#111827}
  .small{font-family:Arial, Helvetica, sans-serif;font-size:12px;fill:#374151}
  .tiny{font-family:Arial, Helvetica, sans-serif;font-size:10px;fill:#374151}
  .title{font-family:Arial, Helvetica, sans-serif;font-size:26px;font-weight:700;fill:#111827}
  .subtitle{font-family:Arial, Helvetica, sans-serif;font-size:14px;fill:#4b5563}
  .section{font-family:Arial, Helvetica, sans-serif;font-size:17px;font-weight:700;fill:#111827}
  .note{font-family:Arial, Helvetica, sans-serif;font-size:12px;fill:#4b5563}
  .soft{fill:#f3f4f6;stroke:#d1d5db;stroke-width:1}
  .cab6{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2}
  .cab9{fill:#dcfce7;stroke:#15803d;stroke-width:2}
  .cab12{fill:#ffedd5;stroke:#c2410c;stroke-width:2}
  .cart{fill:#e5e7eb;stroke:#374151;stroke-width:2}
  .zone{fill:#fef3c7;stroke:#92400e;stroke-width:2;stroke-dasharray:7 5}
  .vent{fill:#ecfeff;stroke:#0891b2;stroke-width:1.5;stroke-dasharray:5 4}
  .warn{fill:#fff7ed;stroke:#fdba74;stroke-width:1.5}
  .sweep{fill:#fef2f2;stroke:#ef4444;stroke-width:1.5;stroke-dasharray:6 5}
  .grid{stroke:#e5e7eb;stroke-width:0.6}
</style>

